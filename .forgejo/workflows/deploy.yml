name: Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PNPM_STORE_DIR: ~/.pnpm-store
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Unit and component tests
        run: pnpm exec vitest run

      - name: End-to-end tests
        run: pnpm exec playwright test

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    env:
      PNPM_STORE_DIR: ~/.pnpm-store
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require deploy vars and secrets
        env:
          PUBLIC_MEDIA_SERVER_URL: ${{ vars.PUBLIC_MEDIA_SERVER_URL }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          APP_HOST: ${{ vars.APP_HOST }}
          APP_PORT: ${{ vars.APP_PORT }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          missing=0
          for name in PUBLIC_MEDIA_SERVER_URL DEPLOY_HOST DEPLOY_USER DEPLOY_PATH DEPLOY_PORT APP_HOST APP_PORT APP_ORIGIN; do
            if [ -z "${!name}" ]; then
              echo "Missing Actions variable: ${name}" >&2
              missing=1
            fi
          done
          for name in DEPLOY_SSH_KEY DEPLOY_SSH_KNOWN_HOSTS; do
            if [ -z "${!name}" ]; then
              echo "Missing Actions secret: ${name}" >&2
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Build
        run: pnpm build
        env:
          PUBLIC_MEDIA_SERVER_URL: ${{ vars.PUBLIC_MEDIA_SERVER_URL }}

      - name: Package deploy payload
        run: |
          mkdir -p payload
          cp -a build package.json pnpm-lock.yaml pnpm-workspace.yaml .npmrc deploy payload/
          chmod +x payload/deploy/remote-install.sh

      - name: Install deploy tools
        run: |
          need=()
          command -v rsync >/dev/null || need+=(rsync)
          command -v ssh >/dev/null || need+=(openssh-client)
          if [ "${#need[@]}" -eq 0 ]; then
            exit 0
          fi
          install_apt() {
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq "$@"
            else
              apt-get update -qq
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq "$@"
            fi
          }
          if command -v apt-get >/dev/null 2>&1; then
            install_apt "${need[@]}"
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache rsync openssh-client
          else
            echo "Runner is missing: ${need[*]}. Install them on the ubuntu-latest runner image." >&2
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync to LXC
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${DEPLOY_PORT} -o IdentitiesOnly=yes" \
            ./payload/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Remote install and restart
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
          APP_HOST: ${{ vars.APP_HOST }}
          APP_PORT: ${{ vars.APP_PORT }}
          APP_ORIGIN: ${{ vars.APP_ORIGIN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT}" -o IdentitiesOnly=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_USER='${DEPLOY_USER}' \
             APP_HOST='${APP_HOST}' APP_PORT='${APP_PORT}' APP_ORIGIN='${APP_ORIGIN}' \
             bash '${DEPLOY_PATH}/deploy/remote-install.sh'"
